[package]
name = "input-overlay"
version = "0.1.0"
edition = "2021"

[dependencies]
slint = { version = "1.7", features = ["wayland"] }
evdev = "0.12"
tokio = { version = "1", features = ["full"] }
thiserror = "1.0"
nix = { version = "0.27", features = ["poll"] }

[target.'cfg(target_os = "linux")'.dependencies]
wayland-client = "0.31"

[profile.release]
opt-level = 3
lto = true
strip = true
